name: Daily Upgrade

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenCode daily component upgrade
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/deepseek-v4-flash
          share: false
          prompt: |
            You maintain the varsys-react-ui component library at packages/varsys-ui.

            COMPONENT SOURCES to scan daily for NEW components:
            - https://ui.shadcn.com (shadcn/ui)
            - https://magicui.design (Magic UI animated components)
            - https://ui.aceternity.com (Aceternity UI)
            - https://originui.com (Origin UI)
            - https://21st.dev (community marketplace)
            - https://radi-ui.com (Radi UI)
            - https://tremor.so (Tremor dashboard components)
            - https://hyperui.dev (HyperUI)
            - https://floatui.com (Float UI)
            - https://preline.co (Preline)
            - https://mantine.dev (Mantine)

            CATEGORY RULES (place each component in its correct folder):
            src/components/buttons/   -> Button variants, icon buttons
            src/components/cards/     -> Cards, bento grids, spotlights
            src/components/forms/     -> Inputs, selects, toggles, sliders
            src/components/navigation/-> Menus, tabs, accordion, breadcrumbs
            src/components/overlays/  -> Dialogs, modals, sheets, drawers, popovers, tooltips
            src/components/display/   -> Avatars, badges, tables, timelines, progress
            src/components/text-effects/ -> Animated text, typing effects
            src/components/effects/   -> Particles, beams, grids, backgrounds
            src/components/device-mocks/ -> Phone, browser, macbook mockups
            src/components/layout/   -> Dock, marquee, resizable panels
            src/components/data-viz/ -> Globes, maps, charts

            For each NEW component found:
            1. Read source code from the website using curl or webfetch
            2. Check if we already have it (compare with existing files)
            3. Write component to src/components/<category>/<name>.tsx
            4. Create a Storybook story at src/stories/<category>/<Name>.stories.tsx
            5. Add export to src/index.ts
            6. Add any needed dependencies to package.json
            7. Run: npm install --legacy-peer-deps
            8. Run: npm run build
            9. Commit with message: "feat: add <component> from <source>"

            MAINTENANCE TASKS (every run):
            1. Check for TypeScript errors across src/components/ and fix them
            2. Check story files match their component APIs
            3. Ensure every component in src/components/ is exported in src/index.ts
            4. Run npm run build to verify

            Commit directly to master. Do not create PRs.
