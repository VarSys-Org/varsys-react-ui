name: Daily Upgrade

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash
        shell: bash

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run daily component upgrade
        run: |
          opencode run --auto \
            --model opencode-go/deepseek-v4-flash \
            "You maintain the varsys-react-ui component library.

            COMPONENT SOURCES to scan for NEW components:
            - https://ui.shadcn.com
            - https://magicui.design
            - https://ui.aceternity.com
            - https://originui.com
            - https://21st.dev
            - https://radi-ui.com
            - https://tremor.so
            - https://hyperui.dev
            - https://floatui.com
            - https://preline.co

            For each NEW component:
            1. Download source code using curl
            2. Write to src/components/<category>/<name>.tsx
            3. Create story at src/stories/<category>/<Name>.stories.tsx
            4. Export from src/index.ts
            5. Run npm install --legacy-peer-deps
            6. Run npm run build
            7. Git commit and push

            Also fix any TypeScript errors found.
            Commit directly to master. Do not create PRs."
        shell: bash
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
