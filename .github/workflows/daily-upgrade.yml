name: Daily Upgrade

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenCode daily upgrade
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          prompt: |
            Review the varsys-react-ui component library codebase at packages/varsys-ui.

            Tasks:
            1. Check all component source files under src/components/ for any bugs, TypeScript errors, or deprecated API usage. Fix them.
            2. Check all Storybook story files under src/stories/ - ensure they render correctly and match their component APIs.
            3. Review package.json dependencies - check if any can be upgraded to latest compatible versions without breaking changes.
            4. Check for any missing exports in src/index.ts - every component in src/components/ should be exported.
            5. If dependencies were updated, run `npm install --legacy-peer-deps` and commit the updated lockfile.
            6. Run `npm run build` to verify the build passes.
            7. Run `npm run build-storybook` to verify Storybook builds.

            For each issue found:
            - Fix it directly in the codebase
            - Commit with a clear message referencing what was fixed

            If no issues are found, do nothing.
            Do not open issues or PRs - commit directly to master.
